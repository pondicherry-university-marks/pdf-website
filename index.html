<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .viewer-container {
            flex: 1;
            display: flex;
            overflow: hidden;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .error-message {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            z-index: 100;
        }

        .error-message.show {
            display: block;
        }

        .error-message h2 {
            color: #e74c3c;
            margin-bottom: 10px;
        }

        .error-message p {
            color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="viewer-container">
        <iframe id="pdfViewer"></iframe>
        <div id="errorMessage" class="error-message">
            <h2>⚠️ Error</h2>
            <p id="errorText">Could not load the PDF. Please check the filename and try again.</p>
        </div>
    </div>

    <script>
        function loadPDF() {
            const filename = 'doocument.pdf'; // Change this to your PDF filename
            const errorDiv = document.getElementById('errorMessage');
            
            const iframe = document.getElementById('pdfViewer');
            iframe.src = filename;
            errorDiv.classList.remove('show');

            // Show error if PDF fails to load
            iframe.onerror = () => {
                const errorText = document.getElementById('errorText');
                errorText.textContent = `Could not load "${filename}". Make sure it exists in the repository.`;
                errorDiv.classList.add('show');
            };
        }

        // Load PDF on page load
        window.addEventListener('DOMContentLoaded', () => {
            loadPDF();
        });
    </script>
</body>
</html>

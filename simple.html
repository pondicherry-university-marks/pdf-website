<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: #fff;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            flex: 1;
        }

        @media (max-width: 768px) {
            body {
                height: 100vh;
            }

            iframe {
                height: 100vh;
            }
        }

        @media (max-width: 480px) {
            body {
                height: 100vh;
                width: 100vw;
                padding: 0;
                margin: 0;
            }

            iframe {
                height: 100vh;
                width: 100vw;
            }
        }
    </style>
</head>
<body>
    <iframe id="pdfViewer"></iframe>
    <script>
        const params = new URLSearchParams(window.location.search);
        const pdfFile = params.get('pdf') || 'https://raw.githubusercontent.com/pondicherry-university-marks/pdf-website/main/doocument.pdf';
        document.getElementById('pdfViewer').src = pdfFile;
    </script>
</body>
</html>

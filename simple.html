<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        html, body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>
    <iframe id="pdfViewer"></iframe>
    <script>
        const params = new URLSearchParams(window.location.search);
        const pdfFile = params.get('pdf') || 'doocument.pdf';
        document.getElementById('pdfViewer').src = pdfFile;
    </script>
</body>
</html>

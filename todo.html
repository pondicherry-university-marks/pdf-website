<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>To-Do List App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
            flex-shrink: 0;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .input-section {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
            min-width: 0;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        button:hover {
            background: #5568d3;
        }

        button:active {
            transform: scale(0.98);
        }

        .tasks-section {
            padding: 20px;
            overflow-y: auto;
            flex: 1;
            min-height: 0;
        }

        .task-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f9f9f9;
            border-radius: 6px;
            margin-bottom: 10px;
            transition: all 0.3s;
            animation: slideIn 0.3s ease;
            gap: 10px;
            min-height: 0;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-item:hover {
            background: #f0f0f0;
            transform: translateX(5px);
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-text {
            text-decoration: line-through;
            color: #999;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            min-width: 20px;
            cursor: pointer;
            accent-color: #667eea;
            flex-shrink: 0;
        }

        .task-text {
            flex: 1;
            font-size: 15px;
            color: #333;
            word-break: break-word;
            min-width: 0;
        }

        .delete-btn {
            background: #e74c3c;
            padding: 8px 12px;
            font-size: 12px;
            flex-shrink: 0;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .stats {
            padding: 15px 20px;
            background: #f9f9f9;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-around;
            font-size: 14px;
            color: #666;
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 10px;
        }

        .stat {
            text-align: center;
            flex: 1;
            min-width: 80px;
        }

        .stat-number {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
            display: block;
        }

        .clear-btn {
            background: #95a5a6;
            padding: 10px 15px;
            font-size: 12px;
            width: calc(100% - 40px);
            margin: 10px 20px 20px 20px;
            flex-shrink: 0;
        }

        .clear-btn:hover {
            background: #7f8c8d;
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }

            .container {
                max-height: 95vh;
            }

            .header {
                padding: 20px 15px;
            }

            .header h1 {
                font-size: 24px;
            }

            .stats {
                flex-direction: row;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
                min-height: 100vh;
            }

            .container {
                max-height: none;
                height: auto;
                display: flex;
                flex-direction: column;
            }

            .header {
                padding: 15px 12px;
            }

            .header h1 {
                font-size: 20px;
                margin-bottom: 5px;
            }

            .header p {
                font-size: 12px;
            }

            .input-section {
                padding: 15px;
                flex-direction: column;
                gap: 8px;
            }

            input[type="text"] {
                padding: 10px 12px;
                font-size: 16px;
            }

            button {
                padding: 10px 15px;
                font-size: 13px;
                width: 100%;
            }

            .delete-btn {
                padding: 6px 10px;
                font-size: 11px;
            }

            .tasks-section {
                padding: 15px;
                max-height: 50vh;
            }

            .task-item {
                padding: 12px;
                margin-bottom: 8px;
                gap: 8px;
            }

            .task-text {
                font-size: 14px;
            }

            .stats {
                padding: 12px 15px;
                font-size: 12px;
                gap: 8px;
            }

            .stat {
                min-width: 70px;
            }

            .stat-number {
                font-size: 18px;
            }

            .clear-btn {
                width: calc(100% - 30px);
                margin: 8px 15px 15px 15px;
                padding: 8px 12px;
                font-size: 12px;
            }

            input[type="checkbox"] {
                width: 18px;
                height: 18px;
            }
        }

        @media (max-width: 360px) {
            .header h1 {
                font-size: 18px;
            }

            .task-item {
                padding: 10px;
                font-size: 13px;
            }

            .delete-btn {
                padding: 5px 8px;
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>✓ My To-Do List</h1>
            <p>Stay organized and productive</p>
        </div>

        <div class="input-section">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Add a new task..." 
                autocomplete="off"
            >
            <button onclick="addTask()">Add</button>
        </div>

        <div class="tasks-section">
            <div id="taskList"></div>
            <div id="emptyState" class="empty-state">
                <div class="empty-state-icon">📝</div>
                <p>No tasks yet. Add one to get started!</p>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <span class="stat-number" id="totalCount">0</span>
                <span>Total</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="completedCount">0</span>
                <span>Done</span>
            </div>
            <div class="stat">
                <span class="stat-number" id="pendingCount">0</span>
                <span>Left</span>
            </div>
        </div>

        <button class="clear-btn" onclick="clearCompleted()">Clear Completed</button>
    </div>

    <script>
        const STORAGE_KEY = 'todoList';

        // Load tasks from local storage
        function loadTasks() {
            const stored = localStorage.getItem(STORAGE_KEY);
            return stored ? JSON.parse(stored) : [];
        }

        // Save tasks to local storage
        function saveTasks(tasks) {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
        }

        // Add a new task
        function addTask() {
            const input = document.getElementById('taskInput');
            const taskText = input.value.trim();

            if (!taskText) {
                alert('Please enter a task!');
                return;
            }

            const tasks = loadTasks();
            const newTask = {
                id: Date.now(),
                text: taskText,
                completed: false,
                createdAt: new Date().toLocaleString()
            };

            tasks.push(newTask);
            saveTasks(tasks);
            input.value = '';
            input.focus();

            renderTasks();
            updateStats();
        }

        // Delete a task
        function deleteTask(id) {
            if (confirm('Delete this task?')) {
                let tasks = loadTasks();
                tasks = tasks.filter(task => task.id !== id);
                saveTasks(tasks);
                renderTasks();
                updateStats();
            }
        }

        // Toggle task completion
        function toggleTask(id) {
            const tasks = loadTasks();
            const task = tasks.find(t => t.id === id);
            if (task) {
                task.completed = !task.completed;
                saveTasks(tasks);
                renderTasks();
                updateStats();
            }
        }

        // Clear all completed tasks
        function clearCompleted() {
            if (confirm('Delete all completed tasks?')) {
                let tasks = loadTasks();
                tasks = tasks.filter(task => !task.completed);
                saveTasks(tasks);
                renderTasks();
                updateStats();
            }
        }

        // Render all tasks
        function renderTasks() {
            const taskList = document.getElementById('taskList');
            const emptyState = document.getElementById('emptyState');
            const tasks = loadTasks();

            taskList.innerHTML = '';

            if (tasks.length === 0) {
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            tasks.forEach(task => {
                const taskItem = document.createElement('div');
                taskItem.className = `task-item ${task.completed ? 'completed' : ''}`;
                taskItem.innerHTML = `
                    <input 
                        type="checkbox" 
                        ${task.completed ? 'checked' : ''} 
                        onchange="toggleTask(${task.id})"
                    >
                    <div class="task-text">${escapeHtml(task.text)}</div>
                    <button class="delete-btn" onclick="deleteTask(${task.id})">Delete</button>
                `;
                taskList.appendChild(taskItem);
            });
        }

        // Update statistics
        function updateStats() {
            const tasks = loadTasks();
            const completed = tasks.filter(t => t.completed).length;
            const pending = tasks.length - completed;

            document.getElementById('totalCount').textContent = tasks.length;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('pendingCount').textContent = pending;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Handle Enter key
        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', () => {
            renderTasks();
            updateStats();
            document.getElementById('taskInput').focus();
        });
    </script>
</body>
</html>
